<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --background: #ffffff;
        --foreground: #09090b;
        --primary: #18181b;
        --primary-foreground: #fafafa;
        --muted: #f4f4f5;
        --muted-foreground: #71717a;
        --border: #e2e8f0;
        --radius: 8px;
      }

      body {
        width: 320px;
        padding: 16px;
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: var(--background);
        color: var(--foreground);
      }

      .header {
        display: flex;
        items-center: center;
        gap: 8px;
        margin-bottom: 20px;
      }

      .logo {
        width: 24px;
        height: 24px;
        background-color: var(--primary);
        border-radius: 4px;
        color: var(--primary-foreground);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 10px;
      }

      .title {
        font-size: 14px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        background-color: #fff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }

      .status-badge {
        font-size: 10px;
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 4px;
        background-color: var(--muted);
        color: var(--muted-foreground);
        text-transform: uppercase;
        display: inline-block;
        margin-bottom: 12px;
      }

      .btn {
        width: 100%;
        padding: 10px;
        border-radius: var(--radius);
        border: 1px solid var(--primary);
        background-color: var(--primary);
        color: var(--primary-foreground);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn:hover {
        opacity: 0.9;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-outline {
        background-color: transparent;
        color: var(--primary);
      }

      .footer {
        margin-top: 16px;
        text-align: center;
        font-size: 11px;
        color: var(--muted-foreground);
      }

      .hidden {
        display: none;
      }

      #message {
        margin-top: 12px;
        font-size: 12px;
        text-align: center;
      }

      .error {
        color: #ef4444;
      }
      .success {
        color: #10b981;
      }

      .loader {
        width: 16px;
        height: 16px;
        border: 2px solid var(--primary-foreground);
        border-bottom-color: transparent;
        border-radius: 50%;
        display: inline-block;
        animation: rotation 1s linear infinite;
      }

      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">JT</div>
      <div class="title">JobTracker</div>
    </div>

    <div id="auth-section" class="card hidden">
      <p style="font-size: 13px; margin-top: 0">
        Connectez-vous pour commencer à enregistrer des offres.
      </p>
      <button id="login-btn" class="btn">Se connecter</button>
    </div>

    <div id="main-section" class="card">
      <div class="status-badge" id="user-display">Chargement...</div>
      <h3 style="font-size: 14px; margin: 0 0 12px 0">
        Offre d'emploi détectée
      </h3>
      <button id="scrape-btn" class="btn">
        <span id="btn-text">Enregistrer cette offre</span>
        <span id="btn-loader" class="loader hidden"></span>
      </button>
      <div id="message"></div>
    </div>

    <div class="footer">Extension JobTracker v1.0</div>

    <script src="supabase.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
